<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css">
  <title>Profile Card</title>
</head>

<body>
    <article class="profile-card">
     <div class="card-header"></div>
        <div class="card-body">
            <div class="avatar-container">
                <img class="avatar" src="images/panther.jpg" alt="Profile Avatar">
            </div>
            
            <h2 class="name">Akenu Michael</h2>
            <p class="title">UI/UX Designer & Developer</p>
            
            <p class="bio">
                Passionate about building clean, accessible, and highly interactive user interfaces. Let's create something cool together.
            </p>
            
            <div class="stats-container">
                <div class="stat-item">
                    <p class="stat-label">Projects</p>
                    <p class="stat-value">12</p>
                </div>
                <div class="stat-item">
                    <p class="stat-label">Followers</p>
                    <p class="stat-value">4.8k</p>
                </div>
                <div class="stat-item">
                    <p class="stat-label">Commits</p>
                    <p class="stat-value">350</p>
                </div>
            </div>
            
            <a href="#" class="action-btn">Connect</a>
        </div>
    </article>
</body>
</html>
